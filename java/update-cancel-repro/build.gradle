plugins {
    id 'java'
    id 'application'
}

sourceCompatibility = '11'
targetCompatibility = '11'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'io.temporal:temporal-sdk:1.32.1'
    implementation 'io.temporal:temporal-envconfig:1.32.1'
    testImplementation 'io.temporal:temporal-testing:1.32.1'

    implementation platform('com.fasterxml.jackson:jackson-bom:2.17.2')
    implementation 'com.fasterxml.jackson.core:jackson-databind'
    implementation 'com.fasterxml.jackson.core:jackson-core'

    implementation 'ch.qos.logback:logback-classic:1.5.6'

    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.12.0'
}

application {
    mainClass = project.properties['mainClass'] ?: 'io.temporal.samples.hello.Starter'
}

tasks.named('run') {
    standardInput = System.in
}
