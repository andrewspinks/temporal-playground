[tools]
"aqua:temporalio/cli" = "1.0.0"  # For CLI commands (workflow start, signal, etc.)

[tasks.server]
description = "Start old temporal server (1.23.0) via Docker on port 7234"
run = "docker compose up"

[tasks.server-down]
description = "Stop the server"
run = "docker compose down"

[tasks.start-parent]
description = "Start the parent workflow"
run = "temporal workflow start --address localhost:7234 --task-queue child-workflows --type parentWorkflow --workflow-id parent-repro-0"

[tasks.signal]
description = "Signal parent workflow to spawn child"
run = "temporal workflow signal --address localhost:7234 --workflow-id parent-repro-0 --name spawnChild"

[tasks.clean]
description = "Delete the shared Docker volume to start fresh"
run = "docker volume rm temporal-repro-pgdata"
